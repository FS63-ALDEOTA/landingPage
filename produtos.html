<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Delivery</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="produtos.css">
</head>
<body>
  <header class="flex justify-between py-8 px-40">
    <img src="./assets/Logo.svg" alt="Logo coffee delivery">
    <div class="flex gap-3">
      <div class="bg-[#EBE5F9] rounded-md flex items-center gap-1 p-2">
        <img src="./assets/local.png" alt="icone localização">
        <span>Porto Alegre, RS</span>
      </div>
      <button class="bg-[#F1E9C9] p-2 rounded-md">
        <img src="./assets/carrinho amarelo.png" alt="icone carinho">
      </button>
    </div>
  </header>
</body>
</html>
